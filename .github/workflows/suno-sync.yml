name: Suno Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.sync.outputs.updated }}
      failed: ${{ steps.sync.outputs.failed }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sync Suno metadata
        id: sync
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ACCOUNT_ID="02a5ee785952a4e4b7b6da209e10c53d"
          D1_ID="9f979733-d291-4e4a-af29-7cb463ca534a"
          API="https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/d1/database/${D1_ID}"

          echo "::group::Fetch songs needing Suno data"
          SONGS_RAW=$(curl -s -X POST "${API}/query" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"sql": "SELECT id, title, suno_track_url FROM songs WHERE suno_track_url IS NOT NULL AND suno_track_url != '\'''\'' AND (suno_audio_url IS NULL OR suno_audio_url = '\'''\'') AND visible = 1 ORDER BY published_at DESC LIMIT 100"}')
          echo "$SONGS_RAW" | jq .
          echo "::endgroup::"

          echo "$SONGS_RAW" > /tmp/songs.json
          ROWS=$(jq '.result[0].results // [] | length' /tmp/songs.json)
          if [ "$ROWS" -eq 0 ]; then
            echo "No songs to sync"
            echo "updated=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Found $ROWS songs to sync"

          jq -c '.result[0].results[]' /tmp/songs.json > /tmp/songs_list.jsonl
          UPDATED=0
          FAILED=0

          while read -r song; do
            ID=$(echo "$song" | jq -r '.id')
            TRACK_URL=$(echo "$song" | jq -r '.suno_track_url')

            echo "---"
            echo "Song #$ID: $TRACK_URL"

            OPENSUNO=$(curl -s "https://opensuno.vercel.app/track?url=${TRACK_URL}")
            STATUS=$(echo "$OPENSUNO" | jq -r '.status // "error"')

            if [ "$STATUS" != "ok" ]; then
              echo "  FAILED: $(echo "$OPENSUNO" | jq -r '.message // "unknown"')"
              FAILED=$((FAILED + 1))
              continue
            fi

            MP3_URL=$(echo "$OPENSUNO" | jq -r '.data.mp3_url // ""')
            COVER_URL=$(echo "$OPENSUNO" | jq -r '.data.cover_url // ""')

            if [ -z "$MP3_URL" ]; then
              echo "  No MP3 URL returned"
              FAILED=$((FAILED + 1))
              continue
            fi

            UPDATE_SQL="UPDATE songs SET suno_audio_url='${MP3_URL}',suno_cover_url=COALESCE(NULLIF('${COVER_URL}',''),suno_cover_url),updated_at=datetime('now') WHERE id=${ID}"
            UPDATE_SQL_ESCAPED=$(echo "$UPDATE_SQL" | jq -R -s -c .)

            UPDATE=$(curl -s -X POST "${API}/query" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"sql\": ${UPDATE_SQL_ESCAPED}}")

            SUCCESS=$(echo "$UPDATE" | jq -r '.success // false')
            if [ "$SUCCESS" = "true" ]; then
              echo "  ✅ MP3: ${MP3_URL}"
              [ -n "$COVER_URL" ] && echo "  🖼️ Cover: ${COVER_URL}"
              UPDATED=$((UPDATED + 1))
            else
              echo "  ❌ DB error: $(echo "$UPDATE" | jq -r '.errors[0].message // "unknown"')"
              FAILED=$((FAILED + 1))
            fi

            sleep 1
          done < /tmp/songs_list.jsonl

          echo "---"
          echo "Done: $UPDATED updated, $FAILED failed"
          echo "updated=${UPDATED}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED}" >> $GITHUB_OUTPUT
