name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Deploy via deployer
        run: |
          curl -s "https://poetry-deployer.shemaxpoetry.workers.dev/deploy-from-url?token=${{ secrets.CF_API_TOKEN }}&url=https://raw.githubusercontent.com/Shemax13/Singingpoetry/refs/heads/master/dist/worker-bundle.js"

      - name: Set GITHUB_TOKEN secret
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/02a5ee785952a4e4b7b6da209e10c53d/workers/scripts/poetry/secrets" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"GITHUB_TOKEN","text":"${{ secrets.GH_TOKEN }}","type":"secret_text"}'
