<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shemaxpoetry</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">Shemax<span>poetry</span></a>
  <button class="lang-toggle" onclick="toggleLang()">EN</button>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1 class="hero-title" data-i18n="heroTitle">Поэзия в звуке</h1>
    <p class="hero-subtitle" data-i18n="heroSubtitle">Авторские песни и стихи</p>
    <button class="hero-cta" onclick="document.querySelector('.songs-section').scrollIntoView({behavior:'smooth'})">
      <span data-i18n="heroCta">Слушать</span> ↓
    </button>
  </div>
</section>

<section class="songs-section">
  <div class="section-header">
    <h2 data-i18n="songsTitle">Песни</h2>
    <p data-i18n="songsSubtitle">Авторская поэзия в музыкальном воплощении</p>
  </div>
  <div class="song-grid" id="songGrid"></div>
</section>

<div class="player-bar" id="playerBar">
  <div class="player-bar-content">
    <div class="player-bar-cover" id="playerBarCover"></div>
    <div class="player-bar-info">
      <div class="player-bar-title" id="playerBarTitle"></div>
    </div>
    <div class="player-bar-controls">
      <button class="pp-play-btn" onclick="togglePlay()">▶</button>
    </div>
  </div>
  <div class="player-bar-progress">
    <input type="range" class="player-progress" id="playerProgress" value="0" max="100" oninput="seekTo(event)">
    <div class="player-time" id="playerTime">0:00 / 0:00</div>
  </div>
</div>

<div id="playerPage" class="player-page hidden">
  <div class="player-page-main">
    <div class="player-page-cover" id="playerPageCover"></div>
    <div class="player-page-info">
      <h2 class="player-page-title" id="playerPageTitle"></h2>
      <div class="player-page-lyrics" id="playerPageLyrics"></div>
    </div>
  </div>

  <div style="display:none">
    <video id="playerVideo" preload="none"></video>
    <audio id="playerAudio" preload="none"></audio>
  </div>

  <div class="mode-switch">
    <button data-mode="video" onclick="switchMode('video')" class="hidden">
      <span data-i18n="playerVideo">Видео</span>
    </button>
    <button data-mode="audio" onclick="switchMode('audio')">
      <span data-i18n="playerAudio">Аудио</span>
    </button>
  </div>

  <div id="playerPageModeVideo" class="hidden player-page-mode"></div>
  <div id="playerPageModeAudio" class="player-page-mode"></div>

  <div class="player-page-controls">
    <button class="play-btn pp-prev-btn" onclick="prevSong()">◀◀</button>
    <button class="play-btn" onclick="togglePlay()">▶</button>
    <button class="play-btn pp-next-btn" onclick="nextSong()">▶▶</button>
  </div>
</div>

<section class="about-section">
  <div class="section-header">
    <h2 data-i18n="aboutTitle">О проекте</h2>
    <p data-i18n="aboutText">Поэтический проект Shemaxpoetry</p>
  </div>
</section>

<div class="player-queue" id="playerQueue"></div>

<script src="/js/i18n.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
